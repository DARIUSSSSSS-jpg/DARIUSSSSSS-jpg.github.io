<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Motion Control Suite - Professional Camera System for Blender">
    <meta name="theme-color" content="#1a1a2e">
    <title>Motion Control Suite - Professional Camera System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-color: #6495dc;
            --danger-color: #f44336;
            --success-color: #4caf50;
            --text-primary: #e8eef7;
            --text-secondary: #a8b8d8;
            --text-tertiary: #7a8ab8;
            --border-color: rgba(100, 150, 200, 0.15);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-primary);
            font-family: 'Roboto', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .main-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* ============ HEADER ============ */
        .header {
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(22, 33, 62, 0.9) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .system-title {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 1.2px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.3s ease;
            user-select: none;
        }

        .system-title:hover {
            color: var(--accent-color);
        }

        .camera-selector {
            background: rgba(40, 60, 90, 0.4);
            border: 1px solid rgba(100, 150, 200, 0.2);
            padding: 8px 16px;
            border-radius: 3px;
            color: #c8d8f0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 300;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .camera-selector:hover,
        .camera-selector:focus {
            background: rgba(40, 60, 90, 0.6);
            border-color: rgba(100, 150, 200, 0.4);
            outline: none;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(40, 60, 90, 0.4);
            border: 1px solid rgba(100, 150, 200, 0.2);
            padding: 8px 16px;
            border-radius: 3px;
            font-size: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d32f2f;
            transition: all 0.3s ease;
        }

        .status-indicator.active {
            background: var(--success-color);
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }

        /* ============ MAIN CONTENT ============ */
        .content {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
        }

        /* ============ LEFT PANEL ============ */
        .left-panel {
            width: 200px;
            background: linear-gradient(180deg, rgba(30, 40, 65, 0.6) 0%, rgba(25, 35, 55, 0.8) 100%);
            border-right: var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-vertical {
            width: 24px;
            height: 80px;
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            background: linear-gradient(to bottom, rgba(100, 150, 220, 0.3), rgba(100, 150, 220, 0.1));
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .slider-value {
            font-size: 11px;
            color: #8fa8d8;
            min-width: 30px;
            text-align: right;
        }

        .axis-buttons {
            display: flex;
            gap: 6px;
        }

        .axis-btn {
            flex: 1;
            padding: 8px;
            background: rgba(60, 100, 150, 0.3);
            border: 1px solid rgba(100, 150, 200, 0.25);
            color: #9eb8d8;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .axis-btn:hover:not(.locked) {
            background: rgba(60, 100, 150, 0.5);
            border-color: rgba(100, 150, 200, 0.4);
        }

        .axis-btn.locked {
            background: rgba(211, 47, 47, 0.3);
            border-color: rgba(211, 47, 47, 0.5);
            color: #ff7675;
        }

        .settings-btn {
            width: 100%;
            padding: 10px;
            background: rgba(60, 100, 150, 0.2);
            border: 1px solid rgba(100, 150, 200, 0.2);
            color: #9eb8d8;
            font-size: 12px;
            font-weight: 300;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings-btn:hover,
        .settings-btn:focus {
            background: rgba(60, 100, 150, 0.4);
            border-color: rgba(100, 150, 200, 0.4);
            outline: none;
        }

        /* ============ CENTER PANEL ============ */
        .center-panel {
            flex: 1;
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .camera-preview {
            width: 100%;
            height: 100%;
            background: #0a0a14;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .camera-preview canvas,
        .camera-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-preview {
            color: #3a4a6a;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .camera-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 16px;
            border-radius: 2px;
            border-left: 2px solid var(--accent-color);
            font-size: 11px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .overlay-row {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 6px;
        }

        .overlay-label {
            color: #5a7a9a;
            min-width: 60px;
        }

        .overlay-value {
            color: var(--accent-color);
            font-weight: 500;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.3px;
        }

        .recording-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 14px;
            border-radius: 2px;
            font-size: 11px;
            z-index: 10;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .recording-badge.idle {
            border-left: 2px solid var(--accent-color);
            color: #7a9ab8;
        }

        .recording-badge.recording {
            border-left: 2px solid var(--danger-color);
            color: #ff7675;
        }

        .record-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--danger-color);
            animation: record-pulse 1s infinite;
        }

        .recording-badge.idle .record-dot {
            background: var(--accent-color);
            animation: none;
        }

        @keyframes record-pulse {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        /* ============ RIGHT PANEL ============ */
        .right-panel {
            width: 220px;
            background: linear-gradient(180deg, rgba(30, 40, 65, 0.6) 0%, rgba(25, 35, 55, 0.8) 100%);
            border-left: var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .action-button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(100, 150, 200, 0.3);
            border-radius: 3px;
            font-weight: 300;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(60, 100, 150, 0.2);
            color: #9eb8d8;
        }

        .action-button:hover:not(:disabled) {
            background: rgba(60, 100, 150, 0.4);
            border-color: rgba(100, 150, 200, 0.5);
        }

        .action-button:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(100, 150, 220, 0.3);
        }

        .action-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .action-button.primary {
            background: rgba(100, 150, 220, 0.3);
            border-color: rgba(100, 150, 220, 0.5);
            color: var(--accent-color);
        }

        .action-button.record {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.4);
            color: #ff7675;
        }

        .control-section {
            background: rgba(40, 60, 90, 0.3);
            padding: 12px;
            border-radius: 3px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .slider-horizontal {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, rgba(100, 150, 220, 0.3), rgba(100, 150, 220, 0.1));
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .slider-horizontal::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(100, 150, 220, 0.6);
        }

        .slider-horizontal::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(100, 150, 220, 0.6);
        }

        .value-display {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #5a7a9a;
        }

        .value-display-current {
            color: var(--accent-color);
            font-weight: 500;
        }

        .duration-input-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .duration-input {
            flex: 1;
            padding: 8px;
            background: rgba(40, 60, 90, 0.5);
            border: 1px solid rgba(100, 150, 200, 0.25);
            color: var(--text-primary);
            border-radius: 2px;
            font-size: 12px;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            transition: all 0.2s ease;
        }

        .duration-input:focus {
            outline: none;
            border-color: rgba(100, 150, 200, 0.5);
            box-shadow: 0 0 6px rgba(100, 150, 220, 0.2);
        }

        /* ============ BOTTOM TIMELINE ============ */
        .timeline-bar {
            background: linear-gradient(180deg, rgba(30, 40, 65, 0.7) 0%, rgba(25, 35, 55, 0.9) 100%);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 70px;
            backdrop-filter: blur(10px);
        }

        .timeline-nav-buttons {
            display: flex;
            gap: 4px;
        }

        .timeline-btn {
            background: rgba(60, 100, 150, 0.3);
            border: 1px solid rgba(100, 150, 200, 0.25);
            color: #9eb8d8;
            padding: 6px 10px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s ease;
        }

        .timeline-btn:hover,
        .timeline-btn:focus {
            background: rgba(60, 100, 150, 0.5);
            border-color: rgba(100, 150, 200, 0.4);
            outline: none;
        }

        .frame-label {
            font-size: 10px;
            color: #5a7a9a;
            min-width: 40px;
            user-select: none;
        }

        .timeline-scrubber {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .timeline-track {
            width: 100%;
            height: 3px;
            background: rgba(100, 150, 220, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .timeline-progress {
            height: 100%;
            background: var(--accent-color);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #3a5a7a;
            padding: 0 4px;
            user-select: none;
        }

        .frame-info {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: #7a9ab8;
            align-items: center;
            user-select: none;
        }

        .frame-info-label {
            color: #5a7a9a;
        }

        .frame-info-value {
            color: var(--accent-color);
            font-weight: 500;
            font-family: 'Courier New', monospace;
        }

        /* ============ MODAL ============ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 40, 65, 0.95) 0%, rgba(25, 35, 55, 0.95) 100%);
            border: 1px solid rgba(100, 150, 200, 0.2);
            border-radius: 3px;
            padding: 28px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .modal-title {
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input,
        .input-group select {
            background: rgba(40, 60, 90, 0.5);
            border: 1px solid rgba(100, 150, 200, 0.25);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 2px;
            font-size: 12px;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            transition: all 0.2s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: rgba(100, 150, 200, 0.5);
            background: rgba(40, 60, 90, 0.7);
            box-shadow: 0 0 8px rgba(100, 150, 220, 0.2);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(100, 150, 200, 0.3);
            border-radius: 2px;
            background: rgba(60, 100, 150, 0.2);
            color: #9eb8d8;
            font-weight: 300;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .modal-buttons button:first-child {
            background: rgba(100, 150, 220, 0.3);
            border-color: rgba(100, 150, 220, 0.5);
            color: var(--accent-color);
        }

        .modal-buttons button:hover {
            background: rgba(60, 100, 150, 0.4);
            border-color: rgba(100, 150, 200, 0.5);
        }

        .modal-buttons button:first-child:hover {
            background: rgba(100, 150, 220, 0.5);
        }

        .modal-buttons button:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(100, 150, 220, 0.3);
        }

        /* ============ SCROLLBAR ============ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(40, 60, 90, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 200, 0.4);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 200, 0.6);
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .left-panel, .right-panel {
                width: 150px;
                padding: 12px;
            }

            .header {
                flex-direction: column;
                gap: 12px;
            }

            .timeline-bar {
                flex-direction: column;
                height: auto;
            }
        }

        /* ============ ACCESSIBILITY ============ */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus visible para navegación por teclado */
        *:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <h1 class="system-title" onclick="openSettingsModal()" role="button" tabindex="0">Motion Control Suite</h1>
            </div>
            <div class="header-right">
                <select class="camera-selector" id="cameraSelect" aria-label="Select camera">
                    <option value="camera1">Camera 1</option>
                    <option value="camera2">Camera 2</option>
                    <option value="camera3">Camera 3</option>
                </select>
                <div class="connection-status" role="status" aria-live="polite">
                    <div class="status-indicator" id="statusIndicator" aria-hidden="true"></div>
                    <span id="statusText">DISCONNECTED</span>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="content">
            <!-- LEFT PANEL -->
            <div class="left-panel">
                <div class="control-group">
                    <div class="control-label">Axis Lock</div>
                    <div class="axis-buttons">
                        <button class="axis-btn" id="lockX" onclick="toggleAxisLock('X')" aria-pressed="false">X</button>
                        <button class="axis-btn" id="lockY" onclick="toggleAxisLock('Y')" aria-pressed="false">Y</button>
                        <button class="axis-btn" id="lockZ" onclick="toggleAxisLock('Z')" aria-pressed="false">Z</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="posScaleSlider" class="control-label">Position Scale</label>
                    <div class="slider-container">
                        <input type="range" class="slider-vertical" id="posScaleSlider" min="0" max="100" value="50" aria-label="Position scale slider">
                        <div class="slider-value" id="posScaleValue" aria-live="polite">50</div>
                    </div>
                </div>

                <div class="control-group">
                    <label for="smoothSlider" class="control-label">Smoothing</label>
                    <div class="slider-container">
                        <input type="range" class="slider-vertical" id="smoothSlider" min="0" max="100" value="70" aria-label="Smoothing slider">
                        <div class="slider-value" id="smoothValue" aria-live="polite">70</div>
                    </div>
                </div>

                <button class="settings-btn" onclick="openSettingsModal()">Configuration</button>
                <button class="settings-btn" onclick="disconnect()" id="disconnectBtn" style="color: #ff7675; border-color: rgba(244, 67, 54, 0.3); background: rgba(244, 67, 54, 0.1);">Disconnect</button>
            </div>

            <!-- CENTER PANEL -->
            <div class="center-panel">
                <div class="video-container">
                    <div class="camera-preview" id="cameraPreview">
                        <canvas id="previewCanvas" style="display: none;"></canvas>
                        <div class="no-preview">Camera Preview</div>
                    </div>

                    <div class="camera-overlay" role="region" aria-label="Camera overlay information">
                        <div class="overlay-row">
                            <span class="overlay-label">Rotation</span>
                            <span class="overlay-value" id="overlayRotation">0.00 / 0.00 / 0.00</span>
                        </div>
                        <div class="overlay-row">
                            <span class="overlay-label">Position</span>
                            <span class="overlay-value" id="overlayPosition">0.00 / 0.00 / 0.00</span>
                        </div>
                        <div class="overlay-row">
                            <span class="overlay-label">FOV</span>
                            <span class="overlay-value" id="overlayFOV">50.0</span>
                        </div>
                    </div>

                    <div class="recording-badge idle" id="recordingBadge" role="status" aria-live="polite">
                        <div class="record-dot"></div>
                        <span id="recordingStatus">Standby</span>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <button class="action-button primary" id="startMotionBtn" onclick="startSendingMotion()" disabled>Start Motion</button>
                <button class="action-button" onclick="playAnimation()" id="playBtn" disabled>Play Animation</button>
                <button class="action-button record" onclick="toggleRecording()" id="recordBtn" disabled>Record Motion</button>

                <div class="control-section">
                    <div class="section-title">Zoom Control</div>
                    <input type="range" class="slider-horizontal" id="zoomSlider" min="1" max="200" value="50" aria-label="Zoom slider">
                    <div class="value-display">
                        <span class="value-display-current" id="zoomValue">50.0</span>
                        <span>200.0</span>
                    </div>
                </div>

                <div class="control-section">
                    <div class="section-title">Recording Range</div>
                    <input type="range" class="slider-horizontal" id="recordRangeSlider" min="0" max="100" value="50" aria-label="Recording range slider">
                    <div class="value-display">
                        <span class="value-display-current" id="recordRangeValue">0.00</span>
                        <span id="recordRangeMax">100.00</span>
                    </div>
                </div>

                <div class="control-section">
                    <div class="section-title">Animation Duration</div>
                    <div class="duration-input-container">
                        <input type="number" id="durationInput" class="duration-input" min="1" max="99999" value="100" aria-label="Animation duration in frames">
                        <span style="color: #5a7a9a; font-size: 10px; white-space: nowrap;">Frames</span>
                    </div>
                    <div class="value-display" style="margin-top: 6px;">
                        <span style="color: #5a7a9a;">Total</span>
                        <span id="maxFramesDisplay" class="value-display-current">100</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM TIMELINE -->
        <div class="timeline-bar">
            <div class="timeline-nav-buttons">
                <button class="timeline-btn" onclick="firstFrame()" aria-label="Go to first frame">First</button>
                <button class="timeline-btn" onclick="prevFrame()" aria-label="Go to previous frame">Prev</button>
                <span class="frame-label">Frame</span>
                <button class="timeline-btn" onclick="nextFrame()" aria-label="Go to next frame">Next</button>
                <button class="timeline-btn" onclick="lastFrame()" aria-label="Go to last frame">Last</button>
            </div>

            <div class="timeline-scrubber">
                <div class="timeline-track" id="timelineTrack" role="slider" aria-label="Timeline scrubber" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                    <div class="timeline-progress" id="timelineProgress" style="width: 0%;"></div>
                </div>
                <div class="timeline-labels">
                    <span>0</span>
                    <span id="timelineEnd">100</span>
                </div>
            </div>

            <div class="frame-info">
                <span class="frame-info-label">Frame</span>
                <span class="frame-info-value" id="currentFrameLabel">0</span>
                <span class="frame-info-label">/</span>
                <span class="frame-info-value" id="totalFramesLabel">100</span>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal" id="settingsModal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">System Configuration</div>

            <div class="input-group">
                <label for="blenderIP">Blender Server IP</label>
                <input type="text" id="blenderIP" value="192.168.1.100" placeholder="192.168.1.100" aria-label="Blender server IP address">
            </div>

            <div class="input-group">
                <label for="blenderPort">Server Port</label>
                <input type="number" id="blenderPort" value="5005" min="1000" max="65535" aria-label="Server port number">
            </div>

            <div class="input-group">
                <label for="protocolSelect">Connection Protocol</label>
                <select id="protocolSelect" aria-label="Connection protocol selection">
                    <option value="ws">WebSocket</option>
                    <option value="http">HTTP</option>
                </select>
            </div>

            <div class="input-group">
                <label for="cameraName">Camera Identifier</label>
                <input type="text" id="cameraName" value="camera1" placeholder="camera1" aria-label="Camera identifier">
            </div>

            <div class="input-group">
                <label for="frameRate">Frame Rate</label>
                <input type="number" id="frameRate" value="24" min="1" max="240" aria-label="Frame rate in FPS">
            </div>

            <div class="modal-buttons">
                <button onclick="saveSettingsAndConnect()">Connect</button>
                <button onclick="closeModal('settingsModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ============ ESTADO GLOBAL ============
        let ws = null;
        let isConnected = false;
        let isRecording = false;
        let isSendingMotion = false;
        let lastOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let lastAcceleration = { gx: 0, gy: 0, gz: 0 };
        let zoom = 50;
        let fov = 50;
        let currentFrame = 0;
        let maxFrames = 100;
        let axisLocked = { X: false, Y: false, Z: false };

        // ============ LOAD SETTINGS ============
        function loadSettings() {
            try {
                const saved = localStorage.getItem('motionControlSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    document.getElementById('blenderIP').value = settings.ip || '192.168.1.100';
                    document.getElementById('blenderPort').value = settings.port || '5005';
                    document.getElementById('protocolSelect').value = settings.protocol || 'ws';
                    document.getElementById('cameraName').value = settings.cameraName || 'camera1';
                    document.getElementById('frameRate').value = settings.frameRate || '24';
                }
            } catch (e) {
                console.error('Error cargando configuración:', e);
            }
        }

        function saveSettings() {
            try {
                const settings = {
                    ip: document.getElementById('blenderIP').value,
                    port: document.getElementById('blenderPort').value,
                    protocol: document.getElementById('protocolSelect').value,
                    cameraName: document.getElementById('cameraName').value,
                    frameRate: document.getElementById('frameRate').value
                };
                localStorage.setItem('motionControlSettings', JSON.stringify(settings));
            } catch (e) {
                console.error('Error guardando configuración:', e);
            }
        }

        function saveSettingsAndConnect() {
            saveSettings();
            connect();
        }

        // ============ MODAL CONTROL ============
        function openSettingsModal() {
            const modal = document.getElementById('settingsModal');
            modal.classList.add('active');
            modal.querySelector('input:first-of-type').focus();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal('settingsModal');
            }
        });

        // ============ CONNECTION ============
        async function connect() {
            const ip = document.getElementById('blenderIP').value;
            const port = document.getElementById('blenderPort').value;
            const protocol = document.getElementById('protocolSelect').value;

            if (!ip || !port) {
                alert('Por favor ingresa IP y Puerto');
                return;
            }

            const hasPermissions = await requestPermissions();
            if (!hasPermissions) {
                alert('Se requieren permisos de orientación del dispositivo');
                return;
            }

            if (protocol === 'ws') {
                connectWebSocket(ip, port);
            } else {
                connectHTTP(ip, port);
            }
        }

        function connectWebSocket(ip, port) {
            try {
                const url = `ws://${ip}:${port}`;
                ws = new WebSocket(url);

                ws.onopen = () => {
                    isConnected = true;
                    updateConnectionStatus(true);
                    closeModal('settingsModal');
                    startListeners();
                    console.log('✓ Conectado a Blender');
                };

                ws.onerror = (error) => {
                    console.error('Error WebSocket:', error);
                    updateConnectionStatus(false);
                };

                ws.onclose = () => {
                    isConnected = false;
                    updateConnectionStatus(false);
                    console.log('✗ Desconectado de Blender');
                };
            } catch (error) {
                alert('Conexión fallida: ' + error.message);
                updateConnectionStatus(false);
            }
        }

        function connectHTTP(ip, port) {
            isConnected = true;
            updateConnectionStatus(true);
            closeModal('settingsModal');
            startListeners();
            console.log('✓ Conexión HTTP establecida');
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            isConnected = false;
            isSendingMotion = false;
            isRecording = false;
            updateConnectionStatus(false);
            window.removeEventListener('deviceorientation', handleOrientation);
            window.removeEventListener('devicemotion', handleMotion);
        }

        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            const startBtn = document.getElementById('startMotionBtn');
            const playBtn = document.getElementById('playBtn');
            const recordBtn = document.getElementById('recordBtn');

            if (connected) {
                indicator.classList.add('active');
                text.textContent = 'CONNECTED';
                startBtn.disabled = false;
                playBtn.disabled = false;
                recordBtn.disabled = false;
                startBtn.style.opacity = '1';
            } else {
                indicator.classList.remove('active');
                text.textContent = 'DISCONNECTED';
                startBtn.disabled = true;
                playBtn.disabled = true;
                recordBtn.disabled = true;
                startBtn.style.opacity = '1';
            }
        }

        // ============ PERMISSIONS ============
        async function requestPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    return perm === 'granted';
                } catch (e) {
                    console.warn('Permisos de orientación rechazados:', e);
                    return false;
                }
            }
            return true;
        }

        // ============ MOTION LISTENERS ============
        function startListeners() {
            window.addEventListener('deviceorientation', handleOrientation, false);
            window.addEventListener('devicemotion', handleMotion, false);
        }

        function handleOrientation(event) {
            if (!isSendingMotion) return;

            lastOrientation = {
                alpha: parseFloat(event.alpha.toFixed(2)),
                beta: parseFloat(event.beta.toFixed(2)),
                gamma: parseFloat(event.gamma.toFixed(2))
            };

            document.getElementById('overlayRotation').textContent = 
                `${lastOrientation.alpha.toFixed(2)} / ${lastOrientation.beta.toFixed(2)} / ${lastOrientation.gamma.toFixed(2)}`;

            sendData();
        }

        function handleMotion(event) {
            if (!isSendingMotion) return;

            const acc = event.acceleration || {};
            lastAcceleration = {
                gx: parseFloat((acc.x || 0).toFixed(2)),
                gy: parseFloat((acc.y || 0).toFixed(2)),
                gz: parseFloat((acc.z || 0).toFixed(2))
            };

            document.getElementById('overlayPosition').textContent = 
                `${lastAcceleration.gx.toFixed(2)} / ${lastAcceleration.gy.toFixed(2)} / ${lastAcceleration.gz.toFixed(2)}`;
        }

        function sendData() {
            if (!isConnected) return;

            const data = {
                timestamp: Date.now(),
                alpha: lastOrientation.alpha,
                beta: lastOrientation.beta,
                gamma: lastOrientation.gamma,
                gx: lastAcceleration.gx,
                gy: lastAcceleration.gy,
                gz: lastAcceleration.gz,
                zoom: zoom,
                fov: fov,
                isRecording: isRecording,
                frame: currentFrame,
                axisLocked: axisLocked
            };

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            } else if (isConnected) {
                const ip = document.getElementById('blenderIP').value;
                const port = document.getElementById('blenderPort').value;
                const url = `http://${ip}:${port}/send-motion`;
                
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(e => console.debug('HTTP send failed', e));
            }
        }

        // ============ MOTION CONTROLS ============
        function startSendingMotion() {
            if (!isConnected) return;
            isSendingMotion = !isSendingMotion;
            document.getElementById('startMotionBtn').style.opacity = isSendingMotion ? '1' : '0.5';
        }

        function toggleRecording() {
            if (!isConnected) return;
            isRecording = !isRecording;
            const badge = document.getElementById('recordingBadge');
            const status = document.getElementById('recordingStatus');

            if (isRecording) {
                badge.classList.remove('idle');
                badge.classList.add('recording');
                status.textContent = 'RECORDING';
            } else {
                badge.classList.add('idle');
                badge.classList.remove('recording');
                status.textContent = 'Standby';
            }
        }

        function playAnimation() {
            if (!isConnected) return;
            console.log('Reproduciendo animación');
        }

        function toggleAxisLock(axis) {
            axisLocked[axis] = !axisLocked[axis];
            const btn = document.getElementById('lock' + axis);
            btn.classList.toggle('locked');
            btn.setAttribute('aria-pressed', axisLocked[axis]);
        }

        // ============ SLIDER UPDATES ============
        document.getElementById('posScaleSlider').addEventListener('input', (e) => {
            document.getElementById('posScaleValue').textContent = e.target.value;
        });

        document.getElementById('smoothSlider').addEventListener('input', (e) => {
            document.getElementById('smoothValue').textContent = e.target.value;
        });

        document.getElementById('zoomSlider').addEventListener('input', (e) => {
            zoom = e.target.value;
            document.getElementById('zoomValue').textContent = (zoom * 2).toFixed(1);
        });

        document.getElementById('durationInput').addEventListener('input', (e) => {
            maxFrames = parseInt(e.target.value) || 100;
            document.getElementById('maxFramesDisplay').textContent = maxFrames;
            document.getElementById('timelineEnd').textContent = maxFrames;
            document.getElementById('totalFramesLabel').textContent = maxFrames;
            document.getElementById('recordRangeMax').textContent = maxFrames.toFixed(2);
            document.getElementById('timelineTrack').setAttribute('aria-valuemax', maxFrames);
        });

        document.getElementById('recordRangeSlider').addEventListener('input', (e) => {
            const value = (e.target.value / 100) * maxFrames;
            document.getElementById('recordRangeValue').textContent = value.toFixed(2);
        });

        document.getElementById('timelineTrack').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            currentFrame = Math.floor(percent * maxFrames);
            updateTimeline();
        });

        function updateTimeline() {
            const percent = (currentFrame / maxFrames) * 100;
            document.getElementById('timelineProgress').style.width = percent + '%';
            document.getElementById('currentFrameLabel').textContent = currentFrame;
            document.getElementById('timelineTrack').setAttribute('aria-valuenow', currentFrame);
        }

        function firstFrame() {
            currentFrame = 0;
            updateTimeline();
        }

        function prevFrame() {
            if (currentFrame > 0) currentFrame--;
            updateTimeline();
        }

        function nextFrame() {
            if (currentFrame < maxFrames) currentFrame++;
            updateTimeline();
        }

        function lastFrame() {
            currentFrame = maxFrames;
            updateTimeline();
        }

        // ============ INICIALIZACIÓN ============
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            updateConnectionStatus(false);
        });

        // Keyboard navigation para la timeline
        document.getElementById('timelineTrack').addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevFrame();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextFrame();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
